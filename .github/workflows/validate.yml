name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-skills.mjs
      - name: Test local skill install flow
        run: node scripts/test-install-flow.mjs
      - name: Test documented GitHub install flow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/test-install-flow.mjs vifu-labs/skills
